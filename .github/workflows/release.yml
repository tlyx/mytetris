name: Release

on:
  push:
    tags:
      - 'v*'     # 🎯 只有当打下形如 v0.9.1 这样的正式版 Tag 时，才会唤醒此发布流水线

jobs:
  # ==========================================
  # 第一步：只读环境下的打包 Job
  # ==========================================
  build-app:
    name: Build and Package
    runs-on: macos-latest

    # 🔒 严防死守：整个编译和打包环境只给读权限，防止第三方依赖或工具在构建时恶意篡改代码
    permissions:
      contents: read

    steps:
      # 1. 签出代码仓库（保持深度为 0，确保能抓到当前 Tag 对应的短哈希）
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 初始化 uv 编译器环境
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. 严格同步生产环境依赖
      - name: Install Dependencies
        run: uv sync

      # 4. 执行正式打包流程，此时 main.spec 会自动捕获 pyproject.toml 里的规范版本号
      - name: Build macOS App Bundle
        run: uv run pyinstaller main.spec

      # 5. 合成正式发布的 dmg 安装盘（精准注入 软件名 + 版本号 + Git短哈希）
      - name: Create DMG Installer
        run: |
          brew install create-dmg --quiet

          # 提取当前的 Git 短哈希（7位）
          SHORT_SHA=$(git rev-parse --short HEAD)

          # 从当前的 Git Tag 中提取纯版本号（例如：把 v0.9.1 变成 0.9.1）
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#v}" # 截取掉开头的小写 v

          cd dist
          create-dmg \
            --volname "mytetris Installer" \
            --volicon "../assets/logo.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "mytetris.app" 175 190 \
            --app-drop-link 425 190 \
            "mytetris-${VERSION}-${SHORT_SHA}.dmg" \
            "mytetris.app"

      # 📦 将生成的 dmg 作为临时的 artifacts 暂存（默认保留 90 天，这里只做中转）
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-artifact
          path: dist/*.dmg
          retention-days: 1

  # ==========================================
  # 第二步：获取写权限、纯粹的发布 Job
  # ==========================================
  publish-release:
    name: Production Release Deployment
    runs-on: ubuntu-latest # ✨ 纯发布不需要 macOS 昂贵的算力，用便宜的 Linux 主机顺便省个电
    needs: build-app       # ⏳ 必须等打包 Job 成功完工才能唤醒我

    # 🔒 最小权限精细化控制：只在这个需要往 Releases 页面上传编译果实的 Job 中临时开启写权限
    permissions:
      contents: write

    steps:
      # 1. 签出代码（让 Release Action 能正确认出当前的 Tag 运行上下文）
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 挂载上一步打包好的二进制果实
      - name: Download DMG Artifact
        uses: actions/download-artifact@v4
        with:
          name: dmg-artifact
          path: dist

      # 3. 核心动作：借助临时开启的 write 权限，自动在 GitHub 创建发布页面并挂载 mytetris-X.X.X-hhhhhhh.dmg
      - name: Deploy Official Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
